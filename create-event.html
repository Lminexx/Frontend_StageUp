<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Создать мероприятие - StageUp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<main class="main" style="padding-top: 60px;">
    <div class="container" style="max-width: 600px;">

        <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 30px;">Создать мероприятие</h1>

        <div class="event-card" style="padding: 30px;">
            <!-- Базовая инфа -->
            <div class="form-group">
                <label>Название <span style="color:var(--danger)">*</span></label>
                <input type="text" id="evTitle" placeholder="Например: Джазовый вечер">
            </div>

            <div class="form-group">
                <label>Жанр</label>
                <input type="text" id="evGenre" placeholder="Например: Рок, Стендап, Джаз">
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="evDesc" rows="3" style="width:100%; padding:12px; border: 1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-family: 'Manrope';"></textarea>
            </div>

            <!-- Локация -->
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Город</label><input type="text" id="evCity" placeholder="Москва"></div>
                <div class="form-group"><label>Название заведения</label><input type="text" id="evLocation" placeholder="Клуб 'Атмосфера'"></div>
                <div class="form-group"><label>Адрес</label><input type="text" id="evAddress" placeholder="ул. Ленина, 15"></div>
            </div>

            <!-- Время -->
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Дата <span style="color:var(--danger)">*</span></label><input type="date" id="evDate"></div>
                <div class="form-group"><label>Начало <span style="color:var(--danger)">*</span></label><input type="time" id="evStartTime"></div>
                <div class="form-group"><label>Окончание</label><input type="time" id="evEndTime"></div>
            </div>

            <!-- Оплата -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Тип вознаграждения <span style="color:var(--danger)">*</span></label>
                    <select id="evRewardType" style="width:100%; padding:12px; border: 1.5px solid var(--border); border-radius:8px; background:var(--surface2);">
                        <option value="BY_AGREEMENT">По договоренности</option>
                        <option value="FIXED_FEE">Фиксированная оплата</option>
                        <option value="FREE">Бесплатно (Открытый микрофон)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сумма (₽)</label>
                    <input type="number" id="evFee" placeholder="Например: 5000">
                </div>
            </div>

            <button class="btn-modal" onclick="submitCreateEvent()">Опубликовать мероприятие</button>
        </div>
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
