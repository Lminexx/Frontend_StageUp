<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StageUp — Личный кабинет</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .page { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }

        /* ── PROFILE HERO ── */
        .profile-hero {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 36px; margin-bottom: 28px;
            display: flex; gap: 28px; align-items: flex-start;
            position: relative; overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }
        .profile-hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), #7b2fff);
        }
        .avatar {
            width: 96px; height: 96px; border-radius: 50%;
            background: var(--surface2); border: 3px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; overflow: hidden; flex-shrink: 0;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .hero-info { flex: 1; }
        .hero-name { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; color: var(--text); }
        .hero-role {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 50px;
            background: var(--accent-soft); color: var(--accent);
            font-size: 12px; font-weight: 700; letter-spacing: .5px;
            text-transform: uppercase; margin-bottom: 14px;
        }
        .hero-meta { display: flex; gap: 20px; flex-wrap: wrap; }
        .hero-meta-item { display: flex; align-items: center; gap: 6px; color: var(--text-2); font-size: 13px; }
        .hero-meta-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

        .rep-badge {
            display: flex; flex-direction: column; align-items: center;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px 24px; flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
        }
        .rep-badge .rep-num { font-size: 28px; font-weight: 800; color: var(--success); letter-spacing: -1px; }
        .rep-badge .rep-label { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

        /* ── NEW PROFILE BANNER ── */
        .new-profile-banner {
            background: var(--accent-soft); border: 1px dashed var(--accent);
            border-radius: var(--radius); padding: 18px 24px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 14px; color: var(--accent);
            font-size: 14px; font-weight: 600;
        }
        .new-profile-banner svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

        /* ── TABS ── */
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .tab-btn {
            padding: 12px 20px; background: none; border: none;
            color: var(--text-3); font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: 'Manrope', sans-serif;
            border-bottom: 2px solid transparent; margin-bottom: -1px;
            transition: color .2s, border-color .2s;
        }
        .tab-btn:hover { color: var(--text-2); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── CARD ── */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
            transition: background 0.3s, border-color 0.3s;
        }
        .card-title {
            font-size: 15px; font-weight: 700; margin-bottom: 22px;
            display: flex; align-items: center; gap: 8px; color: var(--text);
        }
        .card-title svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2.5; }

        /* ── FORM ── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group-p { display: flex; flex-direction: column; gap: 7px; }
        .form-group-p.span-2 { grid-column: 1/-1; }
        .form-group-p label { font-size: 13px; font-weight: 600; color: var(--text-2); }

        input[type=text].p-input, input[type=email].p-input, input[type=tel].p-input,
        input[type=url].p-input, textarea.p-input {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-family: 'Manrope', sans-serif; font-size: 14px;
            padding: 11px 14px; outline: none; width: 100%;
            transition: border-color .2s, box-shadow .2s, background 0.3s;
        }
        input.p-input::placeholder, textarea.p-input::placeholder { color: var(--text-4); }
        input.p-input:focus, textarea.p-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
            background: var(--surface);
        }
        textarea.p-input { resize: vertical; min-height: 100px; line-height: 1.5; }

        /* ── LIST FIELDS ── */
        .list-field { display: flex; flex-direction: column; gap: 8px; }
        .list-item { display: flex; gap: 8px; align-items: center; }
        .list-item input { flex: 1; }
        .btn-remove {
            width: 34px; height: 34px; flex-shrink: 0;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2s; font-size: 16px; line-height: 1;
        }
        .btn-remove:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
        .btn-add {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: var(--radius-sm);
            background: var(--surface2); border: 1px dashed var(--border);
            color: var(--text-2); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s; font-family: 'Manrope', sans-serif;
            align-self: flex-start; margin-top: 4px;
        }
        .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        /* ── SOCIAL ── */
        .social-item { display: grid; grid-template-columns: 140px 1fr auto; gap: 8px; align-items: center; }

        /* ── SAVE ROW ── */
        .save-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; }
        .btn-save {
            padding: 12px 32px; border-radius: 50px;
            background: var(--accent); border: none; color: #fff;
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: 'Manrope', sans-serif; transition: all .2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-save:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,87,255,.3); }
        .btn-save:active { transform: none; }
        .btn-save.loading { opacity: .7; cursor: wait; pointer-events: none; }
        .btn-cancel {
            padding: 12px 24px; border-radius: 50px;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-2); font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: 'Manrope', sans-serif; transition: all .2s;
        }
        .btn-cancel:hover { border-color: var(--text-2); color: var(--text); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 28px; right: 28px; z-index: 9999;
            padding: 14px 22px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow-md);
            transform: translateY(80px); opacity: 0;
            transition: all .35s cubic-bezier(.34,1.56,.64,1);
            pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--surface2); border: 1px solid var(--success); color: var(--success); }
        .toast.error   { background: var(--surface2); border: 1px solid var(--danger);  color: var(--danger); }
        .toast svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; flex-shrink: 0; }

        /* ── INFO VIEW ── */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-3); font-weight: 700; display: block; margin-bottom: 4px; }
        .info-item .val { font-size: 14px; color: var(--text); font-weight: 500; word-break: break-word; }
        .info-item .val.empty { color: var(--text-3); font-style: italic; }
        .info-item.span-2 { grid-column: 1/-1; }

        .tag-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { padding: 4px 12px; border-radius: 50px; background: var(--surface2); border: 1px solid var(--border); font-size: 12px; color: var(--text-2); font-weight: 600; }

        .social-chips { display: flex; gap: 10px; flex-wrap: wrap; }
        .social-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 50px;
            background: var(--accent-soft); border: 1px solid rgba(0,87,255,.2);
            color: var(--accent); font-size: 13px; font-weight: 600;
            text-decoration: none; transition: all .2s;
        }
        .social-chip:hover { background: rgba(0,87,255,.2); }

        /* ── REP BAR ── */
        .rep-bar-wrap { margin-top: 10px; }
        .rep-bar-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--text-2); }
        .rep-bar-row strong { font-size: 15px; color: var(--text); }
        .rep-bar-bg { height: 8px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
        .rep-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--success)); transition: width 1s ease; }

        /* ── SKELETON ── */
        .skeleton { background: var(--surface2); border-radius: 6px; animation: pulse 1.4s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

        @media(max-width:680px){
            .profile-hero { flex-direction: column; }
            .rep-badge { flex-direction: row; gap: 12px; align-items: center; width: 100%; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group-p.span-2 { grid-column: unset; }
            .info-grid { grid-template-columns: 1fr; }
            .info-item.span-2 { grid-column: unset; }
            .social-item { grid-template-columns: 1fr 1fr auto; }
        }
    </style>
    <script>
        // Применяем тему до рендера — без мигания
        (function () {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container">
        <a class="logo" href="index.html" style="text-decoration:none">StageUp</a>
        <div style="display:flex;align-items:center;gap:12px">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1"  x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <a class="logout-inline-btn" href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:6px">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                На главную
            </a>
            <button class="logout-inline-btn" onclick="handleLogout()">Выйти</button>
        </div>
    </div>
</header>

<!-- TOAST -->
<div class="toast" id="toast">
    <svg viewBox="0 0 24 24" id="toastIcon"></svg>
    <span id="toastMsg"></span>
</div>

<!-- PAGE -->
<main class="page" id="pageContent"></main>

<script>
    /* ════════════════════════════════
       THEME
    ════════════════════════════════ */
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    }

    /* ════════════════════════════════
       UTILS
    ════════════════════════════════ */
    const API = 'http://localhost:8080/api/v1';

    function getToken()  { return localStorage.getItem('token'); }

    function decodeJWT(token) {
        try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
        catch { return null; }
    }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        document.getElementById('toastIcon').innerHTML = type === 'success'
            ? '<polyline points="20 6 9 17 4 12"/>'
            : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
        t.className = `toast ${type}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3200);
    }

    function handleLogout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    /* ════════════════════════════════
       BOOTSTRAP
    ════════════════════════════════ */
    const token = getToken();
    if (!token) window.location.href = 'index.html';

    const jwt    = decodeJWT(token);
    const role   = (jwt?.role || jwt?.roles?.[0] || '').toUpperCase();
    const userId = jwt?.sub || jwt?.userId || jwt?.id || null;

    if      (role === 'ARTIST')    loadArtistProfile();
    else if (role === 'ORGANIZER') loadOrganizerProfile();
    else {
        document.getElementById('pageContent').innerHTML =
            `<div style="text-align:center;padding:80px 24px;color:var(--text-3)">
            <div style="font-size:40px;margin-bottom:16px">🤔</div>
            <p>Не удалось определить роль.<br>Попробуйте войти заново.</p>
         </div>`;
    }

    /* ════════════════════════════════
       ARTIST — LOAD
    ════════════════════════════════ */

    // Флаг: существует ли профиль на бэке
    let artistExists = false;

    async function loadArtistProfile() {
        document.getElementById('pageContent').innerHTML = renderSkeleton();

        let artist = {};
        try {
            const res = await fetch(`${API}/artist/profile`, { headers: authHeaders() });
            if (res.ok) {
                artist = await res.json();
                artistExists = true;        // профиль уже есть → будем делать PUT
            } else if (res.status === 404) {
                artistExists = false;       // профиля нет → при сохранении делаем POST
            }
        } catch {}

        document.getElementById('pageContent').innerHTML = renderArtistPage(artist, !artistExists);
        initTabs();
        initArtistForm(artist);
        animateRepBar(artist.reputationScore || 0);

        // Если профиль новый — сразу открываем вкладку редактирования
        if (!artistExists) switchTab('edit');
    }

    /* ════════════════════════════════
       ARTIST — RENDER
    ════════════════════════════════ */
    function renderArtistPage(a, isNew) {
        const name = a.displayName || jwt?.sub || 'Артист';
        const rep  = parseFloat(a.reputationScore || 0).toFixed(1);

        return `
    ${isNew ? `
    <div class="new-profile-banner">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Профиль ещё не заполнен. Заполните данные и нажмите «Сохранить» — мы создадим ваш профиль артиста.
    </div>` : ''}

    <div class="profile-hero">
        <div class="avatar">${a.profilePictureUrl ? `<img src="${esc(a.profilePictureUrl)}" alt="avatar">` : '🎤'}</div>
        <div class="hero-info">
            <div class="hero-name">${esc(name)}</div>
            <div class="hero-role">🎤 Артист</div>
            <div class="hero-meta">
                ${a.genre ? `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>${esc(a.genre)}</div>` : ''}
                ${a.city  ? `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(a.city)}</div>` : ''}
            </div>
        </div>
        <div class="rep-badge">
            <div class="rep-num">${rep}</div>
            <div class="rep-label">Репутация</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="view">Профиль</button>
        <button class="tab-btn" data-tab="edit">${isNew ? '✏️ Заполнить профиль' : 'Редактировать'}</button>
    </div>

    <!-- VIEW -->
    <div class="tab-panel active" id="tab-view">
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Основная информация</div>
            <div class="info-grid">
                <div class="info-item"><label>Имя / псевдоним</label><div class="val ${!a.displayName?'empty':''}">${a.displayName?esc(a.displayName):'Не указано'}</div></div>
                <div class="info-item"><label>Жанр</label><div class="val ${!a.genre?'empty':''}">${a.genre?esc(a.genre):'Не указано'}</div></div>
                <div class="info-item"><label>Город</label><div class="val ${!a.city?'empty':''}">${a.city?esc(a.city):'Не указано'}</div></div>
                <div class="info-item"><label>Телефон</label><div class="val ${!a.contactPhone?'empty':''}">${a.contactPhone?esc(a.contactPhone):'Не указано'}</div></div>
                <div class="info-item"><label>Email для связи</label><div class="val ${!a.contactEmail?'empty':''}">${a.contactEmail?esc(a.contactEmail):'Не указано'}</div></div>
                <div class="info-item span-2"><label>О себе</label><div class="val ${!a.description?'empty':''}">${a.description?esc(a.description):'Не заполнено'}</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Медиа</div>
            <div class="info-grid">
                <div class="info-item span-2"><label>Видео-примеры</label>${a.videoSamples?.length?`<div class="tag-list">${a.videoSamples.map(v=>`<span class="tag">🎬 ${esc(v)}</span>`).join('')}</div>`:'<div class="val empty">Не добавлено</div>'}</div>
                <div class="info-item span-2"><label>Аудио-примеры</label>${a.audioSamples?.length?`<div class="tag-list">${a.audioSamples.map(v=>`<span class="tag">🎵 ${esc(v)}</span>`).join('')}</div>`:'<div class="val empty">Не добавлено</div>'}</div>
            </div>
        </div>
        ${a.socialLinks&&Object.keys(a.socialLinks).length?`
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Соцсети</div>
            <div class="social-chips">${Object.entries(a.socialLinks).map(([k,v])=>`<a class="social-chip" href="${esc(v)}" target="_blank">🔗 ${esc(k)}</a>`).join('')}</div>
        </div>`:''}
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Репутация</div>
            <div class="rep-bar-wrap">
                <div class="rep-bar-row"><span>Рейтинг</span><strong>${rep} / 10</strong></div>
                <div class="rep-bar-bg"><div class="rep-bar-fill" id="repBarFill" style="width:0%"></div></div>
            </div>
        </div>
    </div>

    <!-- EDIT -->
    <div class="tab-panel" id="tab-edit">
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>${isNew ? 'Создание профиля' : 'Редактировать профиль'}</div>
            <div class="form-grid">
                <div class="form-group-p"><label>Имя / псевдоним</label><input class="p-input" type="text" id="f_displayName" placeholder="Сценическое имя" value="${esc(a.displayName||'')}"></div>
                <div class="form-group-p"><label>Жанр</label><input class="p-input" type="text" id="f_genre" placeholder="Поп, рок, джаз…" value="${esc(a.genre||'')}"></div>
                <div class="form-group-p"><label>Город</label><input class="p-input" type="text" id="f_city" placeholder="Москва" value="${esc(a.city||'')}"></div>
                <div class="form-group-p"><label>Телефон</label><input class="p-input" type="tel" id="f_contactPhone" placeholder="+7 999 000 00 00" value="${esc(a.contactPhone||'')}"></div>
                <div class="form-group-p"><label>Email для связи</label><input class="p-input" type="email" id="f_contactEmail" placeholder="you@example.com" value="${esc(a.contactEmail||'')}"></div>
                <div class="form-group-p"><label>Фото профиля (URL)</label><input class="p-input" type="url" id="f_profilePictureUrl" placeholder="https://..." value="${esc(a.profilePictureUrl||'')}"></div>
                <div class="form-group-p span-2"><label>О себе</label><textarea class="p-input" id="f_description" placeholder="Расскажите о себе…">${esc(a.description||'')}</textarea></div>
            </div>

            <div class="form-group-p" style="margin-top:20px">
                <label>Видео-примеры (URL)</label>
                <div class="list-field" id="videoList"></div>
                <button type="button" class="btn-add" onclick="addListItem('videoList','Ссылка на видео')">+ Добавить</button>
            </div>
            <div class="form-group-p" style="margin-top:20px">
                <label>Аудио-примеры (URL)</label>
                <div class="list-field" id="audioList"></div>
                <button type="button" class="btn-add" onclick="addListItem('audioList','Ссылка на аудио')">+ Добавить</button>
            </div>
            <div class="form-group-p" style="margin-top:20px">
                <label>Соцсети</label>
                <div class="list-field" id="socialList"></div>
                <button type="button" class="btn-add" onclick="addSocialItem()">+ Добавить соцсеть</button>
            </div>

            <div class="save-row">
                ${!isNew ? `<button type="button" class="btn-cancel" onclick="switchTab('view')">Отмена</button>` : ''}
                <button type="button" class="btn-save" id="saveArtistBtn" onclick="saveArtist()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    ${isNew ? 'Создать профиль' : 'Сохранить'}
                </button>
            </div>
        </div>
    </div>`;
    }

    function initArtistForm(a) {
        (a.videoSamples||[]).forEach(v => addListItem('videoList','Ссылка на видео', v));
        (a.audioSamples||[]).forEach(v => addListItem('audioList','Ссылка на аудио', v));
        Object.entries(a.socialLinks||{}).forEach(([k,v]) => addSocialItem(k, v));
    }

    /* ════════════════════════════════
       ARTIST — SAVE (POST или PUT)
    ════════════════════════════════ */
    async function saveArtist() {
        const btn = document.getElementById('saveArtistBtn');
        const isNew = !artistExists;

        btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> ${isNew ? 'Создаём…' : 'Сохраняем…'}`;
        btn.classList.add('loading');

        // Тело запроса — одинаковое для POST и PUT
        const body = {
            userId,
            displayName:       document.getElementById('f_displayName').value.trim()       || null,
            genre:             document.getElementById('f_genre').value.trim()             || null,
            city:              document.getElementById('f_city').value.trim()              || null,
            description:       document.getElementById('f_description').value.trim()       || null,
            contactPhone:      document.getElementById('f_contactPhone').value.trim()      || null,
            contactEmail:      document.getElementById('f_contactEmail').value.trim()      || null,
            profilePictureUrl: document.getElementById('f_profilePictureUrl').value.trim() || null,
            reputationScore:   null,   // только бэк управляет
            videoSamples:      getListValues('videoList'),
            audioSamples:      getListValues('audioList'),
            socialLinks:       getSocialValues(),
        };

        // POST — создание, PUT — обновление
        const url    = isNew ? `${API}/artist/create` : `${API}/artist/profile`;
        const method = isNew ? 'POST' : 'PUT';

        try {
            const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });

            if (res.ok) {
                artistExists = true;   // теперь профиль точно есть
                showToast(isNew ? 'Профиль создан! 🎉' : 'Профиль сохранён!', 'success');
                setTimeout(() => loadArtistProfile(), 600);
            } else {
                const e = await res.json().catch(() => ({}));
                showToast(e?.detail || e?.message || 'Ошибка сохранения', 'error');
            }
        } catch {
            showToast('Ошибка сети. Попробуйте позже.', 'error');
        } finally {
            btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${isNew ? 'Создать профиль' : 'Сохранить'}`;
            btn.classList.remove('loading');
        }
    }

    /* ════════════════════════════════
       ORGANIZER — LOAD
    ════════════════════════════════ */
    let organizerExists = false;

    async function loadOrganizerProfile() {
        document.getElementById('pageContent').innerHTML = renderSkeleton();
        let org = {};
        try {
            const res = await fetch(`${API}/organization/profile`, { headers: authHeaders() });
            if (res.ok) {
                org = await res.json();
                organizerExists = true;
            } else if (res.status === 404) {
                organizerExists = false;
            }
        } catch {}
        document.getElementById('pageContent').innerHTML = renderOrganizerPage(org, !organizerExists);
        initTabs();
        if (!organizerExists) switchTab('edit');
    }

    function renderOrganizerPage(o, isNew) {
        const name = o.name || jwt?.sub || 'Организатор';
        return `
    ${isNew ? `
    <div class="new-profile-banner">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Профиль организатора ещё не заполнен. Заполните данные и нажмите «Создать профиль».
    </div>` : ''}

    <div class="profile-hero">
        <div class="avatar">${o.logo_url?`<img src="${esc(o.logo_url)}" alt="logo">`:'🎪'}</div>
        <div class="hero-info">
            <div class="hero-name">${esc(name)}</div>
            <div class="hero-role">🎪 Организатор</div>
            <div class="hero-meta">
                ${o.city    ? `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(o.city)}</div>` : ''}
                ${o.website ? `<div class="hero-meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>${esc(o.website)}</div>` : ''}
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="view">Профиль</button>
        <button class="tab-btn" data-tab="edit">${isNew ? '✏️ Заполнить профиль' : 'Редактировать'}</button>
    </div>

    <div class="tab-panel active" id="tab-view">
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Организация</div>
            <div class="info-grid">
                <div class="info-item"><label>Название</label><div class="val ${!o.name?'empty':''}">${o.name?esc(o.name):'Не указано'}</div></div>
                <div class="info-item"><label>Город</label><div class="val ${!o.city?'empty':''}">${o.city?esc(o.city):'Не указано'}</div></div>
                <div class="info-item span-2"><label>Адрес</label><div class="val ${!o.address?'empty':''}">${o.address?esc(o.address):'Не указано'}</div></div>
                <div class="info-item"><label>Телефон</label><div class="val ${!o.contact_phone?'empty':''}">${o.contact_phone?esc(o.contact_phone):'Не указано'}</div></div>
                <div class="info-item"><label>Email</label><div class="val ${!o.contact_email?'empty':''}">${o.contact_email?esc(o.contact_email):'Не указано'}</div></div>
                <div class="info-item span-2"><label>Сайт</label><div class="val ${!o.website?'empty':''}">${o.website?`<a href="${esc(o.website)}" target="_blank" style="color:var(--accent)">${esc(o.website)}</a>`:'Не указано'}</div></div>
                <div class="info-item span-2"><label>Описание</label><div class="val ${!o.description?'empty':''}">${o.description?esc(o.description):'Не заполнено'}</div></div>
            </div>
        </div>
    </div>

    <div class="tab-panel" id="tab-edit">
        <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>${isNew ? 'Создание профиля' : 'Редактировать профиль'}</div>
            <div class="form-grid">
                <div class="form-group-p"><label>Название</label><input class="p-input" type="text" id="f_name" placeholder="Название площадки…" value="${esc(o.name||'')}"></div>
                <div class="form-group-p"><label>Город</label><input class="p-input" type="text" id="f_org_city" placeholder="Москва" value="${esc(o.city||'')}"></div>
                <div class="form-group-p span-2"><label>Адрес</label><input class="p-input" type="text" id="f_address" placeholder="ул. Пушкина, д. 1" value="${esc(o.address||'')}"></div>
                <div class="form-group-p"><label>Телефон</label><input class="p-input" type="tel" id="f_contact_phone" placeholder="+7 999 000 00 00" value="${esc(o.contact_phone||'')}"></div>
                <div class="form-group-p"><label>Email</label><input class="p-input" type="email" id="f_contact_email" placeholder="info@venue.ru" value="${esc(o.contact_email||'')}"></div>
                <div class="form-group-p"><label>Сайт</label><input class="p-input" type="url" id="f_website" placeholder="https://venue.ru" value="${esc(o.website||'')}"></div>
                <div class="form-group-p"><label>Логотип (URL)</label><input class="p-input" type="url" id="f_logo_url" placeholder="https://..." value="${esc(o.logo_url||'')}"></div>
                <div class="form-group-p span-2"><label>Описание</label><textarea class="p-input" id="f_description_org" placeholder="О вашей площадке…">${esc(o.description||'')}</textarea></div>
            </div>
            <div class="save-row">
                ${!isNew ? `<button type="button" class="btn-cancel" onclick="switchTab('view')">Отмена</button>` : ''}
                <button type="button" class="btn-save" id="saveOrgBtn" onclick="saveOrganizer()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    ${isNew ? 'Создать профиль' : 'Сохранить'}
                </button>
            </div>
        </div>
    </div>`;
    }

    async function saveOrganizer() {
        const btn   = document.getElementById('saveOrgBtn');
        const isNew = !organizerExists;

        btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> ${isNew ? 'Создаём…' : 'Сохраняем…'}`;
        btn.classList.add('loading');

        const body = {
            user_id:       userId,
            name:          document.getElementById('f_name').value.trim()          || null,
            city:          document.getElementById('f_org_city').value.trim()      || null,
            address:       document.getElementById('f_address').value.trim()       || null,
            contact_phone: document.getElementById('f_contact_phone').value.trim() || null,
            contact_email: document.getElementById('f_contact_email').value.trim() || null,
            website:       document.getElementById('f_website').value.trim()       || null,
            logo_url:      document.getElementById('f_logo_url').value.trim()      || null,
            description:   document.getElementById('f_description_org').value.trim() || null,
        };

        const url    = isNew ? `${API}/organization/create` : `${API}/organization/profile`;
        const method = isNew ? 'POST' : 'PUT';

        try {
            const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
            if (res.ok) {
                organizerExists = true;
                showToast(isNew ? 'Профиль создан! 🎉' : 'Профиль сохранён!', 'success');
                setTimeout(() => loadOrganizerProfile(), 600);
            } else {
                const e = await res.json().catch(() => ({}));
                showToast(e?.detail || e?.message || 'Ошибка сохранения', 'error');
            }
        } catch {
            showToast('Ошибка сети. Попробуйте позже.', 'error');
        } finally {
            btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${isNew ? 'Создать профиль' : 'Сохранить'}`;
            btn.classList.remove('loading');
        }
    }

    /* ════════════════════════════════
       TABS
    ════════════════════════════════ */
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
    }
    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
    }

    /* ════════════════════════════════
       DYNAMIC LISTS
    ════════════════════════════════ */
    function addListItem(containerId, placeholder, value = '') {
        const wrap = document.getElementById(containerId);
        const div  = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<input class="p-input" type="url" placeholder="${placeholder}" value="${esc(value)}">
                     <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
        wrap.appendChild(div);
    }

    function getListValues(containerId) {
        return [...document.querySelectorAll(`#${containerId} input`)].map(i => i.value.trim()).filter(Boolean);
    }

    function addSocialItem(key = '', value = '') {
        const wrap = document.getElementById('socialList');
        const div  = document.createElement('div');
        div.className = 'social-item list-item';
        div.innerHTML = `<input class="p-input" type="text" placeholder="VK, YouTube…" value="${esc(key)}">
                     <input class="p-input" type="url"  placeholder="https://..."  value="${esc(value)}">
                     <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
        wrap.appendChild(div);
    }

    function getSocialValues() {
        const result = {};
        document.querySelectorAll('#socialList .social-item').forEach(row => {
            const [k, v] = [...row.querySelectorAll('input')].map(i => i.value.trim());
            if (k && v) result[k] = v;
        });
        return result;
    }

    /* ════════════════════════════════
       MISC
    ════════════════════════════════ */
    function animateRepBar(score) {
        const fill = document.getElementById('repBarFill');
        if (fill) setTimeout(() => { fill.style.width = Math.min(parseFloat(score) * 10, 100) + '%'; }, 100);
    }

    function renderSkeleton() {
        return `
    <div class="profile-hero">
        <div class="skeleton" style="width:96px;height:96px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:12px">
            <div class="skeleton" style="width:200px;height:28px;border-radius:6px"></div>
            <div class="skeleton" style="width:100px;height:20px;border-radius:20px"></div>
        </div>
    </div>
    <div class="card" style="margin-top:28px">
        <div class="skeleton" style="height:180px;border-radius:8px"></div>
    </div>`;
    }
</script>
</body>
</html>
