<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Мои мероприятия - StageUp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container">
        <a href="index.html" class="logo">StageUp</a>
        <nav class="nav">
            <a href="events.html">Выступления</a>
            <a href="organizer.html" class="active">Организатору</a>
        </nav>
        <div class="user-menu" id="userMenu">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <a class="profile-link" href="profile.html">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="userDisplayName"></span>
            </a>
            <button class="logout-inline-btn" onclick="handleLogout()">Выйти</button>
        </div>
    </div>
</header>

<main class="main" style="padding-top: 40px;">
    <div class="container">
        <div class="filters-bar" style="justify-content: space-between; align-items: center; margin-bottom: 32px;">
            <div>
                <h1 style="margin: 0; font-size: 24px;">Мои мероприятия</h1>
                <p style="margin: 4px 0 0; color: var(--text-3);">Управляйте своими выступлениями и заявками</p>
            </div>
            <button class="btn-primary" onclick="window.location.href='create-event.html'">+ Добавить событие</button>
        </div>

        <!-- Сетка карточек -->
        <div id="myEventsGrid" class="events-grid">
            <!-- Сюда JS загрузит твои ивенты -->
        </div>
    </div>
</main>

<script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        initAuthState();
        // Проверка роли: если не организатор — на выход
        const jwt = decodeJWT(localStorage.getItem('token'));
        if (!jwt || (jwt.role !== 'ORGANIZER' && (!jwt.roles || !jwt.roles.includes('ORGANIZER')))) {
            window.location.href = 'index.html';
        } else {
            loadMyEvents();
        }
    });
</script>
</body>
</html>
